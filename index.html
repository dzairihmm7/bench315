<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bench 315 — Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;padding:1.5rem}
.app{max-width:700px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.header-title{font-size:22px;font-weight:600;color:#f0f0f0}
.header-sub{font-size:13px;color:#666}
.pr-bar-wrap{margin-top:12px;padding:12px 16px;background:#1a1a1a;border-radius:12px;border:0.5px solid #2a2a2a}
.pr-bar-labels{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px}
.pr-bar-track{height:8px;background:#111;border-radius:4px;overflow:hidden;border:0.5px solid #2a2a2a}
.pr-bar-fill{height:100%;background:#378ADD;border-radius:4px;transition:width 0.6s}
.view-tabs{display:flex;gap:0;margin-bottom:1.5rem;border:0.5px solid #2a2a2a;border-radius:8px;overflow:hidden;width:100%}
.view-tab{flex:1;padding:8px 12px;background:transparent;color:#666;font-size:13px;cursor:pointer;border:none;border-right:0.5px solid #2a2a2a;transition:all 0.15s;font-family:inherit;white-space:nowrap}
.view-tab:last-child{border-right:none}
.view-tab.active{background:#1a1a1a;color:#f0f0f0;font-weight:500}
.view-tab:hover:not(.active){background:#161616}
.session-tabs{display:flex;gap:6px;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:4px}
.session-tab{padding:8px 16px;border:0.5px solid #2a2a2a;border-radius:20px;background:transparent;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;font-family:inherit}
.session-tab:hover:not(.active){background:#1a1a1a;border-color:#3a3a3a}
.sess-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.sess-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sess-info .title{font-size:16px;font-weight:500;color:#f0f0f0}
.sess-info .sub{font-size:13px;color:#666}
.ex-card{background:#161616;border:0.5px solid #2a2a2a;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;transition:border-color 0.15s}
.ex-card:hover{border-color:#3a3a3a}
.ex-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ex-left{display:flex;align-items:center;gap:10px}
.ex-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ex-name{font-size:14px;font-weight:500;color:#f0f0f0}
.ex-tag{font-size:11px;color:#666;background:#1f1f1f;padding:2px 8px;border-radius:20px;border:0.5px solid #2a2a2a}
.target-pill{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.target-pill.up{background:#173404;color:#97C459}
.target-pill.same{background:#1a1a1a;color:#666}
.target-pill.down{background:#501313;color:#F09595}
.target-pill.new{background:#042C53;color:#85B7EB}

/* SET GRID — mobile first, rangées verticales */
.sets-container{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.set-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#111;border:0.5px solid #2a2a2a;border-radius:8px}
.set-num{font-size:12px;font-weight:600;color:#555;width:28px;flex-shrink:0}
.set-field{display:flex;flex-direction:column;gap:3px;flex:1}
.set-field-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em}
.set-inp{width:100%;padding:7px 8px;text-align:center;border:0.5px solid #2a2a2a;border-radius:6px;background:#1a1a1a;color:#f0f0f0;font-size:14px;font-family:inherit}
.set-inp:focus{outline:none;border-color:#378ADD}
.set-inp.weight-inp{font-weight:600;border-color:#3a3a3a;font-size:15px}
.set-divider{width:0.5px;height:32px;background:#2a2a2a;flex-shrink:0}
.rpe-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:#111;border:0.5px solid #2a2a2a;border-radius:8px}
.rpe-label{font-size:12px;color:#666;flex:1}
.rpe-select{padding:6px 8px;border:0.5px solid #2a2a2a;border-radius:6px;background:#1a1a1a;color:#f0f0f0;font-size:13px;font-family:inherit}
.rpe-select:focus{outline:none;border-color:#378ADD}
.target-hint{font-size:11px;color:#555;margin-top:6px;padding:0 2px}
.target-hint span{color:#97C459}

.btn-primary{width:100%;padding:13px;border:none;border-radius:12px;background:#378ADD;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-top:1rem;font-family:inherit}
.btn-primary:hover{background:#2970c4}
.btn-primary:active{transform:scale(0.98)}

/* HISTORY */
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{text-align:left;color:#555;font-size:11px;font-weight:500;padding:6px 8px 6px 0;border-bottom:0.5px solid #2a2a2a}
.hist-table td{padding:8px 8px 8px 0;border-bottom:0.5px solid #1a1a1a;color:#f0f0f0;vertical-align:top}
.hist-table tr:last-child td{border-bottom:none}
.date-col{color:#555;white-space:nowrap}
.rpe-badge{font-size:11px;background:#1a1a1a;color:#666;padding:1px 6px;border-radius:20px;display:inline-block}
.set-chips{display:flex;flex-wrap:wrap;gap:4px}
.set-chip{font-size:11px;background:#1f1f1f;border:0.5px solid #2a2a2a;border-radius:4px;padding:2px 6px;color:#888;white-space:nowrap}

/* PROGRESS */
.metric-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.metric-card{background:#1a1a1a;border-radius:8px;padding:1rem;border:0.5px solid #2a2a2a}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-val{font-size:22px;font-weight:600;color:#f0f0f0}
.metric-unit{font-size:12px;color:#444;margin-top:2px}
.chart-wrap{position:relative;width:100%;height:200px;margin:1rem 0}
.prog-ex-card{background:#161616;border:0.5px solid #2a2a2a;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.prog-ex-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.prog-ex-title{display:flex;align-items:center;gap:8px}
.prog-ex-name{font-size:14px;font-weight:500;color:#f0f0f0}
.prog-ex-stats{display:flex;gap:16px;font-size:12px;color:#666}
.prog-ex-stats strong{color:#f0f0f0;font-weight:500}
.prog-ex-body{border-top:0.5px solid #2a2a2a;padding-top:10px;margin-top:10px}
.mini-chart{position:relative;width:100%;height:80px;margin-bottom:10px}
.prog-hist-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid #1a1a1a;font-size:12px;gap:8px}
.prog-hist-row:last-child{border-bottom:none}
.prog-hist-date{color:#555;flex-shrink:0;width:80px}
.prog-hist-right{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.prog-hist-w{font-weight:500;color:#f0f0f0}
.prog-hist-sets{color:#666;font-size:11px}

.sess-section-title{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.07em;margin:1.5rem 0 0.75rem;display:flex;align-items:center;gap:8px}
.sess-section-title::after{content:'';flex:1;height:0.5px;background:#2a2a2a}
.divider{height:0.5px;background:#1f1f1f;margin:1.5rem 0}
.empty{text-align:center;padding:2.5rem 1rem;color:#444;font-size:13px}
.expand-icon{color:#555;font-size:12px;transition:transform 0.2s;flex-shrink:0}
.expand-icon.open{transform:rotate(180deg)}

/* CALENDAR */
.cal-section{margin-bottom:1.5rem}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-title{font-size:16px;font-weight:500;color:#f0f0f0}
.cal-sub{font-size:13px;color:#666;margin-bottom:1.25rem}
.cal-bloc-card{background:#161616;border:0.5px solid #2a2a2a;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.cal-bloc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-bloc-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#1f1f1f;color:#666;border:0.5px solid #2a2a2a}
.cal-rows{display:flex;flex-direction:column;gap:8px}
.cal-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cal-sess-select{padding:7px 8px;border:0.5px solid #2a2a2a;border-radius:8px;background:#111;color:#f0f0f0;font-size:13px;font-family:inherit;flex-shrink:0}
.cal-date-input{padding:7px 10px;border:0.5px solid #2a2a2a;border-radius:8px;background:#111;color:#f0f0f0;font-size:13px;font-family:inherit;flex:1;min-width:130px}
.cal-note-input{padding:7px 10px;border:0.5px solid #2a2a2a;border-radius:8px;background:#111;color:#f0f0f0;font-size:13px;font-family:inherit;flex:1;min-width:100px}
.cal-date-input:focus,.cal-note-input:focus,.cal-sess-select:focus{outline:none;border-color:#378ADD}
.cal-date-input::-webkit-calendar-picker-indicator{filter:invert(0.4)}
.btn-cal-save{padding:10px 20px;border:none;border-radius:8px;background:#378ADD;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-cal-save:hover{background:#2970c4}
.btn-add-bloc{width:100%;padding:11px;border:0.5px dashed #3a3a3a;border-radius:12px;background:transparent;color:#666;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:4px}
.btn-add-bloc:hover{background:#161616;color:#f0f0f0;border-color:#555}
.btn-del{padding:4px 10px;border:0.5px solid #2a2a2a;border-radius:6px;background:transparent;color:#555;font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.15s;flex-shrink:0}
.btn-del:hover{background:#501313;color:#F09595;border-color:#501313}
.upcoming-list{margin-top:0.5rem}
.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #1a1a1a;flex-wrap:wrap}
.upcoming-item:last-child{border-bottom:none}
.upcoming-date{font-size:13px;font-weight:500;color:#f0f0f0;width:90px;flex-shrink:0}
.upcoming-sess{font-size:13px;color:#f0f0f0;display:flex;align-items:center;gap:8px;flex:1}
.upcoming-note{font-size:12px;color:#555}
.upcoming-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.days-badge{font-size:11px;padding:2px 8px;border-radius:20px;flex-shrink:0}
.days-badge.soon{background:#173404;color:#97C459}
.days-badge.today{background:#042C53;color:#85B7EB}
.days-badge.past{background:#1a1a1a;color:#555}
.days-badge.upcoming{background:#412402;color:#EF9F27}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#f0f0f0;color:#111;border-radius:12px;padding:10px 22px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="header-title">Bench 315</span>
      <span class="header-sub" id="pr-pct">0% vers l'objectif</span>
    </div>
    <div class="pr-bar-wrap">
      <div class="pr-bar-labels">
        <span id="pr-current">— lbs</span>
        <span>315 lbs</span>
      </div>
      <div class="pr-bar-track"><div class="pr-bar-fill" id="pr-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('log')">Enregistrer</button>
    <button class="view-tab" onclick="switchView('history')">Historique</button>
    <button class="view-tab" onclick="switchView('calendar')">Calendrier</button>
    <button class="view-tab" onclick="switchView('progress')">Progression</button>
  </div>

  <div id="view-log">
    <div class="session-tabs" id="sess-tabs"></div>
    <div id="log-content"></div>
  </div>
  <div id="view-history" style="display:none">
    <div class="session-tabs" id="hist-sess-tabs"></div>
    <div id="hist-content"></div>
  </div>
  <div id="view-calendar" style="display:none"></div>
  <div id="view-progress" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const TAG_COLORS={
  'Bench':'#378ADD','Dos':'#1D9E75','Chest':'#D85A30','Biceps':'#639922',
  'Triceps':'#7F77DD','Épaules':'#BA7517','Support':'#666','Récup':'#1D9E75',
  'Avant-bras':'#993556','Volume':'#378ADD','Technique':'#D85A30'
};

const SESSIONS=[
  {id:'1u',label:'1U — J1',sub:'Single + back-off (lourd)',color:'#378ADD',
   exercises:[
    {id:'bench_single',name:'Bench press — single',tag:'Bench',sets:1,reps:1,hasRPE:true},
    {id:'bench_backoff',name:'Bench press — back-off',tag:'Bench',sets:4,reps:5,hasRPE:true},
    {id:'close_grip',name:'Close grip bench',tag:'Chest',sets:3,reps:6,hasRPE:false},
    {id:'dips_1u',name:'Dips lestés',tag:'Support',sets:3,reps:8,hasRPE:false},
    {id:'curl_barre_1u',name:'Curl barre',tag:'Biceps',sets:3,reps:8,hasRPE:false},
    {id:'lat_pull_1u',name:'Lat pulldown close grip',tag:'Dos',sets:3,reps:10,hasRPE:false},
    {id:'skull_1u',name:'Skull crushers',tag:'Triceps',sets:3,reps:10,hasRPE:false},
    {id:'lateral_1u',name:'Élévations latérales',tag:'Épaules',sets:3,reps:12,hasRPE:false},
    {id:'reardelt_1u',name:'Rear delt poulie',tag:'Épaules',sets:3,reps:15,hasRPE:false},
  ]},
  {id:'2u',label:'2U — Récup',sub:"Récupération active — pas d'échec",color:'#1D9E75',
   exercises:[
    {id:'reardelt_2u',name:'Rear delt poulie',tag:'Récup',sets:3,reps:15,hasRPE:false},
    {id:'face_pulls',name:'Face pulls',tag:'Récup',sets:3,reps:15,hasRPE:false},
    {id:'seated_row',name:'Seated row',tag:'Dos',sets:4,reps:10,hasRPE:false},
    {id:'row_uni',name:'Rowing unilatéral DB',tag:'Dos',sets:3,reps:12,hasRPE:false},
    {id:'bayesian',name:'Bayesian curl',tag:'Biceps',sets:3,reps:10,hasRPE:false},
    {id:'lat_raise_cable',name:'Lat. raise poulie',tag:'Épaules',sets:3,reps:12,hasRPE:false},
    {id:'dips_2u',name:'Dips PDC',tag:'Support',sets:3,reps:8,hasRPE:false},
    {id:'pushdown',name:'Bar pushdown',tag:'Triceps',sets:3,reps:12,hasRPE:false},
    {id:'reverse_curl',name:'Reverse curl',tag:'Avant-bras',sets:3,reps:15,hasRPE:false},
  ]},
  {id:'bc',label:'Back & Chest — J2',sub:'Pause bench 2 sec + dos',color:'#D85A30',
   exercises:[
    {id:'pause_bench',name:'Pause bench 2 sec',tag:'Technique',sets:4,reps:4,hasRPE:true},
    {id:'tractions_bc',name:'Tractions',tag:'Dos',sets:3,reps:8,hasRPE:false},
    {id:'upper_fly',name:'Upper chest fly poulie',tag:'Chest',sets:3,reps:12,hasRPE:false},
    {id:'lat_pull_bc',name:'Lat pulldown close grip',tag:'Dos',sets:3,reps:10,hasRPE:false},
    {id:'dips_bc',name:'Dips PDC',tag:'Support',sets:2,reps:10,hasRPE:false},
    {id:'seated_bc',name:'Seated rowing',tag:'Dos',sets:3,reps:10,hasRPE:false},
    {id:'curl_incline',name:'Curl incliné haltère',tag:'Biceps',sets:3,reps:12,hasRPE:false},
    {id:'lat_cable_bc',name:'Élévations lat. câble',tag:'Épaules',sets:3,reps:15,hasRPE:false},
  ]},
  {id:'3u',label:'3U — J3',sub:'Volume / speed + tractions lestées',color:'#7F77DD',
   exercises:[
    {id:'bench_vol',name:'Bench press — volume',tag:'Volume',sets:3,reps:6,hasRPE:true},
    {id:'tractions_3u',name:'Tractions lestées',tag:'Dos',sets:3,reps:5,hasRPE:false},
    {id:'row_smith',name:'Row smith machine',tag:'Dos',sets:3,reps:10,hasRPE:false},
    {id:'military',name:'DB military press',tag:'Épaules',sets:3,reps:10,hasRPE:false},
    {id:'pec_deck',name:'Pec deck',tag:'Chest',sets:3,reps:12,hasRPE:false},
    {id:'curl_marteau',name:'Curl marteau',tag:'Biceps',sets:3,reps:12,hasRPE:false},
    {id:'spider_curl',name:'Spider curl',tag:'Biceps',sets:3,reps:12,hasRPE:false},
    {id:'pushdown_3u',name:'Bar pushdown',tag:'Triceps',sets:3,reps:12,hasRPE:false},
    {id:'lateral_3u',name:'Élévations latérales',tag:'Épaules',sets:3,reps:15,hasRPE:false},
  ]},
];

let curSess='1u',curHistSess='1u',curView='log';
const miniCharts={};
const formData={};

function st(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}}
function ld(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch{return null;}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s).replace(/'/g,"\\'")}

function getFormVal(exId,setIdx,field){
  const k=`${exId}_${setIdx}_${field}`;
  const el=document.getElementById(k);
  return el?el.value:'';
}

function calcTarget(ex,last){
  if(!last) return null;
  const prev=last.exercises[ex.id];
  if(!prev||!prev.sets?.length) return null;
  const lastSets=prev.sets.filter(s=>s.reps>0);
  if(!lastSets.length) return null;
  const avgWeight=Math.round(lastSets.reduce((s,x)=>s+(parseFloat(x.weight)||0),0)/lastSets.length);
  const rpe=parseFloat(prev.rpe)||7;
  const done=lastSets.length;
  if(ex.hasRPE){
    if(rpe<=7.5) return {w:avgWeight+5,dir:'up',label:`+5 lbs — RPE facile`};
    if(rpe<=8.5) return {w:avgWeight,dir:'same',label:`maintien — RPE cible`};
    return {w:Math.max(0,avgWeight-5),dir:'down',label:`-5 lbs — RPE trop élevé`};
  } else {
    if(done>=ex.sets) return {w:avgWeight+5,dir:'up',label:`+5 lbs — sets complets`};
    if(done>=ex.sets-1) return {w:avgWeight,dir:'same',label:`maintien`};
    return {w:Math.max(0,avgWeight-5),dir:'down',label:`-5 lbs — sets manqués`};
  }
}

function switchView(v){
  curView=v;
  document.querySelectorAll('.view-tab').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&v==='log')||(i===1&&v==='history')||(i===2&&v==='calendar')||(i===3&&v==='progress'));
  });
  ['log','history','calendar','progress'].forEach(id=>{
    document.getElementById(`view-${id}`).style.display=v===id?'':'none';
  });
  if(v==='history') renderHistory();
  if(v==='calendar') renderCalendar();
  if(v==='progress') renderProgress();
}

function renderSessTabs(cid,active,fn){
  document.getElementById(cid).innerHTML=SESSIONS.map(s=>
    `<button class="session-tab" onclick="${fn}('${s.id}')" style="${s.id===active?`background:${s.color};border-color:${s.color};color:#fff`:''}">${s.label}</button>`
  ).join('');
}

function switchSess(id){curSess=id;renderSessTabs('sess-tabs',id,'switchSess');renderLog();}
function switchHistSess(id){curHistSess=id;renderSessTabs('hist-sess-tabs',id,'switchHistSess');renderHistory();}

function updatePRBar(){
  let maxB=0;
  SESSIONS.forEach(s=>{
    const hist=ld(`hist_${s.id}`)||[];
    const bEx=s.exercises.find(e=>e.id.includes('bench')||e.id.includes('pause'));
    if(bEx) hist.forEach(e=>{
      const d=e.exercises?.[bEx.id];
      if(d?.sets) d.sets.forEach(s=>{if((parseFloat(s.weight)||0)>maxB) maxB=parseFloat(s.weight)||0;});
    });
  });
  const pct=maxB?Math.min(100,Math.round((maxB/315)*100)):0;
  document.getElementById('pr-fill').style.width=pct+'%';
  document.getElementById('pr-current').textContent=maxB?`${maxB} lbs`:'— lbs';
  document.getElementById('pr-pct').textContent=`${pct}% vers 315 lbs`;
}

function renderLog(){
  renderSessTabs('sess-tabs',curSess,'switchSess');
  const sess=SESSIONS.find(s=>s.id===curSess);
  const hist=ld(`hist_${curSess}`)||[];
  const last=hist.length?hist[hist.length-1]:null;

  let html=`<div class="sess-header">
    <div class="sess-dot" style="background:${sess.color}"></div>
    <div class="sess-info"><div class="title">${sess.label}</div><div class="sub">${sess.sub}</div></div>
  </div>`;

  for(const ex of sess.exercises){
    const target=calcTarget(ex,last);
    const sugW=target?target.w:(last?.exercises?.[ex.id]?.sets?.[0]?.weight||'');
    const pillClass=target?target.dir:'new';
    const pillLabel=target?target.label:'première séance';
    const dotColor=TAG_COLORS[ex.tag]||'#666';

    const prevSets=last?.exercises?.[ex.id]?.sets||[];

    let tableHtml=`<div class="sets-container">
      ${Array.from({length:ex.sets},(_,i)=>{
        const prevW=prevSets[i]?.weight||sugW||'';
        return `<div class="set-row">
          <span class="set-num">S${i+1}</span>
          <div class="set-field">
            <span class="set-field-label">Poids (lbs)</span>
            <input class="set-inp weight-inp" type="number" step="5" inputmode="decimal"
              id="${esc(ex.id)}_${i}_w" value="${prevW}" placeholder="${sugW||'—'}">
          </div>
          <div class="set-divider"></div>
          <div class="set-field">
            <span class="set-field-label">Reps <span style="color:#444">(cible: ${ex.reps})</span></span>
            <input class="set-inp" type="number" min="0" max="30" inputmode="numeric"
              id="${esc(ex.id)}_${i}_r" value="${prevSets[i]?.reps||ex.reps}" placeholder="${ex.reps}">
          </div>
        </div>`;
      }).join('')}
    </div>`;

    if(ex.hasRPE){
      tableHtml+=`<div class="rpe-row">
        <span class="rpe-label">RPE global de l'exercice</span>
        <select class="rpe-select" id="rpe_${esc(ex.id)}">
          ${[6,6.5,7,7.5,8,8.5,9,9.5,10].map(r=>`<option value="${r}" ${r===7?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>`;
    }

    if(target){
      tableHtml+=`<div class="target-hint">Cible prochaine : <span>${target.label}</span></div>`;
    }

    html+=`<div class="ex-card">
      <div class="ex-top">
        <div class="ex-left">
          <div class="ex-dot" style="background:${dotColor}"></div>
          <span class="ex-name">${ex.name}</span>
          <span class="ex-tag">${ex.tag}</span>
        </div>
        <span class="target-pill ${pillClass}">${pillLabel}</span>
      </div>
      ${tableHtml}
    </div>`;
  }

  html+=`<button class="btn-primary" onclick="saveSession()">Sauvegarder la séance</button>`;
  document.getElementById('log-content').innerHTML=html;
}

function saveSession(){
  const sess=SESSIONS.find(s=>s.id===curSess);
  const hist=ld(`hist_${curSess}`)||[];
  const entry={date:new Date().toLocaleDateString('fr-CA'),exercises:{}};

  for(const ex of sess.exercises){
    const sets=Array.from({length:ex.sets},(_,i)=>({
      weight:parseFloat(document.getElementById(`${ex.id}_${i}_w`)?.value)||0,
      reps:parseInt(document.getElementById(`${ex.id}_${i}_r`)?.value)||0,
    }));
    const rpeEl=document.getElementById(`rpe_${ex.id}`);
    entry.exercises[ex.id]={sets,rpe:rpeEl?parseFloat(rpeEl.value):null};
  }

  hist.push(entry);
  const ok=st(`hist_${curSess}`,hist);
  toast(ok?'Séance sauvegardée !':'Erreur de sauvegarde');
  updatePRBar();
  renderLog();
}

function renderHistory(){
  renderSessTabs('hist-sess-tabs',curHistSess,'switchHistSess');
  const sess=SESSIONS.find(s=>s.id===curHistSess);
  const hist=ld(`hist_${curHistSess}`)||[];

  if(!hist.length){
    document.getElementById('hist-content').innerHTML=`<div class="empty">Aucune séance enregistrée pour ${sess.label}</div>`;
    return;
  }

  let html=`<div class="sess-header">
    <div class="sess-dot" style="background:${sess.color}"></div>
    <div class="sess-info"><div class="title">${sess.label}</div><div class="sub">${hist.length} séance${hist.length>1?'s':''} enregistrée${hist.length>1?'s':''}</div></div>
  </div>`;

  for(const ex of sess.exercises){
    const exHist=[...hist].reverse().filter(e=>e.exercises?.[ex.id]?.sets?.some(s=>s.reps>0||s.weight>0));
    if(!exHist.length) continue;
    const allWeights=exHist.flatMap(e=>e.exercises[ex.id].sets.map(s=>parseFloat(s.weight)||0)).filter(w=>w>0);
    const maxW=allWeights.length?Math.max(...allWeights):0;
    const lastW=exHist[0].exercises[ex.id].sets.map(s=>s.weight).filter(Boolean)[0]||0;
    const dotColor=TAG_COLORS[ex.tag]||'#666';

    html+=`<div class="prog-ex-card">
      <div class="prog-ex-header" onclick="toggleEx('h_${ex.id}')">
        <div class="prog-ex-title">
          <div class="ex-dot" style="background:${dotColor}"></div>
          <span class="prog-ex-name">${ex.name}</span>
          <span class="ex-tag">${ex.tag}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="prog-ex-stats">
            <span>Max <strong>${maxW} lbs</strong></span>
            <span>Dernier <strong>${lastW} lbs</strong></span>
          </div>
          <span class="expand-icon" id="icon_h_${ex.id}">▼</span>
        </div>
      </div>
      <div class="prog-ex-body" id="body_h_${ex.id}" style="display:none">
        <table class="hist-table">
          <thead><tr>
            <th>Date</th><th>Sets (poids × reps)</th>${ex.hasRPE?'<th>RPE</th>':''}
          </tr></thead>
          <tbody>
            ${exHist.map(e=>{
              const d=e.exercises[ex.id];
              const chips=d.sets.map((s,i)=>`<span class="set-chip">S${i+1}: ${s.weight||'—'}×${s.reps||'—'}</span>`).join('');
              return `<tr>
                <td class="date-col">${e.date}</td>
                <td><div class="set-chips">${chips}</div></td>
                ${ex.hasRPE?`<td>${d.rpe?`<span class="rpe-badge">RPE ${d.rpe}</span>`:'—'}</td>`:''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  document.getElementById('hist-content').innerHTML=html;
}

function toggleEx(key){
  const body=document.getElementById(`body_${key}`);
  const icon=document.getElementById(`icon_${key}`);
  if(!body) return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(icon) icon.classList.toggle('open',!open);
}

function renderProgress(){
  const allBench=[];
  SESSIONS.forEach(s=>{
    const hist=ld(`hist_${s.id}`)||[];
    const bEx=s.exercises.find(e=>e.id.includes('bench')||e.id.includes('pause'));
    if(bEx) hist.forEach(e=>{
      const d=e.exercises?.[bEx.id];
      if(d?.sets){
        const maxW=Math.max(...d.sets.map(s=>parseFloat(s.weight)||0));
        if(maxW>0) allBench.push({date:e.date,weight:maxW,color:s.color,rpe:d.rpe});
      }
    });
  });
  allBench.sort((a,b)=>new Date(a.date)-new Date(b.date));

  const totals=SESSIONS.reduce((sum,s)=>sum+(ld(`hist_${s.id}`)||[]).length,0);
  const maxB=allBench.length?Math.max(...allBench.map(d=>d.weight)):0;

  let html=`<div class="metric-row">
    <div class="metric-card"><div class="metric-label">Meilleur bench</div><div class="metric-val">${maxB||'—'}</div><div class="metric-unit">lbs</div></div>
    <div class="metric-card"><div class="metric-label">Objectif PR</div><div class="metric-val">315</div><div class="metric-unit">lbs</div></div>
    <div class="metric-card"><div class="metric-label">Séances totales</div><div class="metric-val">${totals}</div><div class="metric-unit">enregistrées</div></div>
  </div>`;

  html+=allBench.length>=2
    ?`<div class="chart-wrap"><canvas id="bChart" role="img" aria-label="Progression bench">Historique bench.</canvas></div>`
    :`<div class="empty">Enregistre 2+ séances bench pour voir le graphique</div>`;

  html+=`<div class="divider"></div>`;

  for(const sess of SESSIONS){
    const hist=ld(`hist_${sess.id}`)||[];
    if(!hist.length) continue;
    html+=`<div class="sess-section-title" style="color:${sess.color}">${sess.label}</div>`;
    for(const ex of sess.exercises){
      const exData=[...hist].reverse().filter(e=>e.exercises?.[ex.id]?.sets?.some(s=>s.weight>0));
      if(!exData.length) continue;
      const allW=exData.flatMap(e=>e.exercises[ex.id].sets.map(s=>parseFloat(s.weight)||0)).filter(w=>w>0);
      const maxW=Math.max(...allW);
      const lastW=exData[0].exercises[ex.id].sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0)[0]||0;
      const firstW=exData[exData.length-1].exercises[ex.id].sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0)[0]||0;
      const delta=lastW-firstW;
      const dotColor=TAG_COLORS[ex.tag]||'#666';

      html+=`<div class="prog-ex-card">
        <div class="prog-ex-header" onclick="toggleProgEx('${sess.id}__${ex.id}')">
          <div class="prog-ex-title">
            <div class="ex-dot" style="background:${dotColor}"></div>
            <span class="prog-ex-name">${ex.name}</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="prog-ex-stats">
              <span>Max <strong>${maxW} lbs</strong></span>
              ${delta!==0?`<span style="color:${delta>0?'#97C459':'#F09595'}">${delta>0?'+':''}${delta} lbs</span>`:''}
            </div>
            <span class="expand-icon" id="picon_${sess.id}__${ex.id}">▼</span>
          </div>
        </div>
        <div class="prog-ex-body" id="pbody_${sess.id}__${ex.id}" style="display:none">
          ${exData.length>=2?`<div class="mini-chart"><canvas id="mc_${sess.id}__${ex.id}" role="img" aria-label="Mini graphique ${ex.name}"></canvas></div>`:''}
          ${exData.map(e=>{
            const d=e.exercises[ex.id];
            const chips=d.sets.map((s,i)=>`<span class="set-chip">S${i+1}: ${s.weight||'—'}×${s.reps||'—'}</span>`).join('');
            return `<div class="prog-hist-row">
              <span class="prog-hist-date">${e.date}</span>
              <div class="prog-hist-right">
                <div class="set-chips" style="justify-content:flex-end">${chips}</div>
                ${d.rpe?`<span class="rpe-badge">RPE ${d.rpe}</span>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
  }

  document.getElementById('view-progress').innerHTML=html;

  if(allBench.length>=2){
    const ctx=document.getElementById('bChart');
    if(ctx) new Chart(ctx,{
      type:'line',
      data:{
        labels:allBench.map(d=>d.date),
        datasets:[{
          label:'Bench (lbs)',
          data:allBench.map(d=>d.weight),
          borderColor:'#378ADD',
          backgroundColor:'rgba(55,138,221,0.08)',
          pointBackgroundColor:allBench.map(d=>d.color),
          pointBorderColor:allBench.map(d=>d.color),
          pointRadius:5,tension:0.3,fill:true,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{beginAtZero:false,ticks:{color:'#555',callback:v=>v+' lbs'},grid:{color:'rgba(255,255,255,0.05)'}},
          x:{ticks:{color:'#555',maxRotation:45,autoSkip:true},grid:{display:false}}
        }
      }
    });
  }
}

function toggleProgEx(key){
  const body=document.getElementById(`pbody_${key}`);
  const icon=document.getElementById(`picon_${key}`);
  if(!body) return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(icon) icon.classList.toggle('open',!open);
  if(!open){
    setTimeout(()=>{
      const [sessId,,exId]=key.split('__');
      const sess=SESSIONS.find(s=>s.id===sessId);
      const ex=sess?.exercises.find(e=>e.id===exId);
      const hist=ld(`hist_${sessId}`)||[];
      const exData=[...hist].reverse().filter(e=>e.exercises?.[exId]?.sets?.some(s=>s.weight>0));
      if(exData.length<2) return;
      const cid=`mc_${key}`;
      const ctx=document.getElementById(cid);
      if(!ctx||miniCharts[cid]) return;
      miniCharts[cid]=new Chart(ctx,{
        type:'line',
        data:{
          labels:exData.map(e=>e.date).reverse(),
          datasets:[{
            data:exData.map(e=>Math.max(...e.exercises[exId].sets.map(s=>parseFloat(s.weight)||0))).reverse(),
            borderColor:TAG_COLORS[ex?.tag]||'#378ADD',
            backgroundColor:'transparent',
            pointRadius:3,
            pointBackgroundColor:TAG_COLORS[ex?.tag]||'#378ADD',
            tension:0.3,
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            y:{beginAtZero:false,ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}},
            x:{ticks:{color:'#555',font:{size:10},maxRotation:30,autoSkip:true},grid:{display:false}}
          }
        }
      });
    },50);
  }
}

function getBlocs(){return ld('cal_blocs')||[];}
function saveBlocs(b){st('cal_blocs',b);}

function renderCalendar(){
  const blocs=getBlocs();
  const today=new Date();today.setHours(0,0,0,0);
  const allEntries=[];
  blocs.forEach((bloc,bi)=>{
    (bloc.entries||[]).forEach(entry=>{
      if(entry.date){
        const d=new Date(entry.date+'T00:00:00');
        const diff=Math.round((d-today)/(1000*60*60*24));
        allEntries.push({...entry,diff,bi});
      }
    });
  });
  allEntries.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const upcoming=allEntries.filter(e=>e.diff>=0).slice(0,8);
  const past=allEntries.filter(e=>e.diff<0).slice(-4).reverse();

  let html=`<div class="cal-section">
    <div class="cal-top">
      <div class="cal-title">Calendrier</div>
      <button class="btn-cal-save" onclick="addBloc()">+ Nouveau bloc</button>
    </div>
    <div class="cal-sub">Planifie tes séances. Chaque bloc = une semaine type.</div>`;

  if(upcoming.length){
    html+=`<div class="sess-section-title">À venir</div><div class="upcoming-list">`;
    upcoming.forEach(e=>{
      const sess=SESSIONS.find(s=>s.id===e.sessId);
      const label=e.diff===0?"Aujourd'hui":e.diff===1?'Demain':`Dans ${e.diff}j`;
      const cls=e.diff===0?'today':e.diff<=3?'soon':e.diff<=7?'upcoming':'past';
      html+=`<div class="upcoming-item">
        <span class="upcoming-date">${formatDate(e.date)}</span>
        <div class="upcoming-sess">${sess?`<div class="upcoming-dot" style="background:${sess.color}"></div>${sess.label}`:'—'}</div>
        ${e.note?`<span class="upcoming-note">${e.note}</span>`:''}
        <span class="days-badge ${cls}">${label}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  if(past.length){
    html+=`<div class="sess-section-title">Passées</div><div class="upcoming-list">`;
    past.forEach(e=>{
      const sess=SESSIONS.find(s=>s.id===e.sessId);
      const diff=Math.abs(e.diff);
      html+=`<div class="upcoming-item" style="opacity:0.45">
        <span class="upcoming-date">${formatDate(e.date)}</span>
        <div class="upcoming-sess">${sess?`<div class="upcoming-dot" style="background:${sess.color}"></div>${sess.label}`:'—'}</div>
        ${e.note?`<span class="upcoming-note">${e.note}</span>`:''}
        <span class="days-badge past">${diff===1?'Hier':`Il y a ${diff}j`}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="sess-section-title">Blocs</div>`;
  if(!blocs.length) html+=`<div class="empty">Aucun bloc. Clique sur "+ Nouveau bloc".</div>`;

  blocs.forEach((bloc,bi)=>{
    const cnt=(bloc.entries||[]).filter(e=>e.date).length;
    html+=`<div class="cal-bloc-card">
      <div class="cal-bloc-header">
        <input style="background:transparent;border:none;color:#f0f0f0;font-size:14px;font-weight:500;font-family:inherit;outline:none;border-bottom:0.5px solid #3a3a3a;padding-bottom:2px;width:200px"
          value="${bloc.name||''}" placeholder="Nom du bloc"
          oninput="updateBlocName(${bi},this.value)">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="cal-bloc-badge">${cnt} séance${cnt!==1?'s':''}</span>
          <button class="btn-del" onclick="deleteBloc(${bi})">Supprimer</button>
        </div>
      </div>
      <div class="cal-rows">
        ${(bloc.entries||[]).map((entry,ei)=>`
          <div class="cal-row">
            <select class="cal-sess-select" onchange="updateEntry(${bi},${ei},'sessId',this.value)">
              ${SESSIONS.map(s=>`<option value="${s.id}" ${entry.sessId===s.id?'selected':''}>${s.label}</option>`).join('')}
            </select>
            <input type="date" class="cal-date-input" value="${entry.date||''}" onchange="updateEntry(${bi},${ei},'date',this.value)">
            <input type="text" class="cal-note-input" value="${entry.note||''}" placeholder="Note" oninput="updateEntry(${bi},${ei},'note',this.value)">
            <button class="btn-del" onclick="deleteEntry(${bi},${ei})">✕</button>
          </div>`).join('')}
        <button class="btn-add-bloc" onclick="addEntry(${bi})">+ Ajouter une séance</button>
      </div>
    </div>`;
  });

  html+=`</div>`;
  document.getElementById('view-calendar').innerHTML=html;
}

function formatDate(s){
  if(!s) return '—';
  return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'short',month:'short',day:'numeric'});
}
function addBloc(){const b=getBlocs();b.push({name:`Bloc ${b.length+1}`,entries:[{sessId:'1u',date:'',note:''}]});saveBlocs(b);renderCalendar();}
function deleteBloc(bi){const b=getBlocs();b.splice(bi,1);saveBlocs(b);renderCalendar();}
function addEntry(bi){const b=getBlocs();b[bi].entries.push({sessId:'1u',date:'',note:''});saveBlocs(b);renderCalendar();}
function deleteEntry(bi,ei){const b=getBlocs();b[bi].entries.splice(ei,1);saveBlocs(b);renderCalendar();}
function updateBlocName(bi,v){const b=getBlocs();b[bi].name=v;saveBlocs(b);}
function updateEntry(bi,ei,f,v){const b=getBlocs();b[bi].entries[ei][f]=v;saveBlocs(b);if(f==='date'||f==='sessId') setTimeout(renderCalendar,100);}

updatePRBar();
renderSessTabs('sess-tabs',curSess,'switchSess');
renderSessTabs('hist-sess-tabs',curHistSess,'switchHistSess');
renderLog();
</script>
</body>
</html>
